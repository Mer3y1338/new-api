name: Build GHCR image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, e.g. v1.0.0-rc.15"
        required: true
        type: string
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: build-ghcr-image-${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Prepare image metadata
        id: image
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease || false }}
        run: |
          set -euo pipefail

          if [ -z "${RELEASE_TAG}" ]; then
            echo "::error::Release tag is required."
            exit 1
          fi

          if ! git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag '${RELEASE_TAG}' does not exist in this repository."
            exit 1
          fi

          owner_lowercase="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner_lowercase}/new-api"

          echo "${RELEASE_TAG}" > VERSION

          {
            echo "image=${image}"
            echo "tag=${RELEASE_TAG}"
            echo "tags<<EOF"
            echo "${image}:${RELEASE_TAG}"
            if [ "${RELEASE_PRERELEASE}" != "true" ]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Image: ${image}"
          echo "Release tag: ${RELEASE_TAG}"
          echo "Prerelease: ${RELEASE_PRERELEASE}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## GHCR image built from release"
            echo
            echo "Release tag: \`${{ steps.image.outputs.tag }}\`"
            echo
            echo "Image tags:"
            echo
            echo '```txt'
            echo "${{ steps.image.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
