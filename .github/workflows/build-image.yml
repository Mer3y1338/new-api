name: Build GHCR image

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: build-ghcr-image
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare image metadata
        id: image
        run: |
          owner_lowercase="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          short_sha="$(git rev-parse --short=12 HEAD)"
          image="ghcr.io/${owner_lowercase}/new-api"

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

          echo "Image: ${image}"
          echo "Short SHA: ${short_sha}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:sha-${{ steps.image.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Docker image built"
            echo
            echo "Image:"
            echo
            echo '```txt'
            echo "${{ steps.image.outputs.image }}:latest"
            echo "${{ steps.image.outputs.image }}:sha-${{ steps.image.outputs.short_sha }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"