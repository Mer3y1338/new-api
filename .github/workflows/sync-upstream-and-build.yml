name: Sync upstream and build custom image

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. 20:10 UTC is 04:10 in Beijing time (UTC+8).
    - cron: '10 20 * * *'

permissions:
  contents: write
  packages: write
  issues: write

concurrency:
  group: sync-upstream-and-build-main
  cancel-in-progress: false

env:
  UPSTREAM_URL: https://github.com/QuantumNous/new-api.git
  TARGET_BRANCH: main
  SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
  SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
  ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

jobs:
  sync-and-build:
    name: Sync upstream and build GHCR image
    runs-on: ubuntu-latest

    steps:
      - name: Check out fork main
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add and fetch upstream
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "$UPSTREAM_URL"
          else
            git remote add upstream "$UPSTREAM_URL"
          fi
          git fetch upstream "$TARGET_BRANCH"

      - name: Merge upstream/main
        id: merge
        run: |
          if git merge-base --is-ancestor "upstream/$TARGET_BRANCH" HEAD; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new upstream commits detected. Skipping push and Docker build."
            exit 0
          fi

          set +e
          git merge --no-edit "upstream/$TARGET_BRANCH"
          merge_status=$?
          set -e

          if [ "$merge_status" -eq 0 ]; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Merge completed successfully."
            exit 0
          fi

          echo "::error::Merge from upstream/$TARGET_BRANCH failed. Collecting conflicted files and aborting merge."
          git diff --name-only --diff-filter=U > conflict-files.txt || true
          if [ ! -s conflict-files.txt ]; then
            echo "(No unmerged files were reported by git diff --diff-filter=U.)" > conflict-files.txt
          fi

          git merge --abort || true
          echo "conflict=true" >> "$GITHUB_OUTPUT"
          echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: Create merge conflict issue
        if: steps.merge.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          issue_body="$(mktemp)"
          {
            echo "Automated upstream sync failed because merging \`upstream/${TARGET_BRANCH}\` into \`${TARGET_BRANCH}\` produced conflicts."
            echo
            echo "- Upstream: ${UPSTREAM_URL}"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Fork commit before sync: ${GITHUB_SHA}"
            echo
            echo "Conflicted files:"
            echo
            echo '```'
            cat conflict-files.txt
            echo '```'
            echo
            echo "The workflow aborted the merge and skipped Docker image build/publish."
          } > "$issue_body"

          gh issue create \
            --title "Upstream sync conflict on ${TARGET_BRANCH}" \
            --body-file "$issue_body"

      - name: Send merge conflict email
        if: steps.merge.outputs.conflict == 'true' && env.SMTP_SERVER != '' && env.SMTP_PORT != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.ALERT_EMAIL != ''
        uses: dawidd6/action-send-mail@v6
        continue-on-error: true
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: New API upstream sync conflict
          to: ${{ env.ALERT_EMAIL }}
          from: ${{ env.SMTP_USERNAME }}
          body: |
            Automated upstream sync failed because merging upstream/main into main produced conflicts.

            Repository: ${{ github.repository }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            A GitHub Issue was created with the conflicted file list. The merge was aborted and Docker image build/publish was skipped.

      - name: Skip merge conflict email when SMTP is not configured
        if: steps.merge.outputs.conflict == 'true' && (env.SMTP_SERVER == '' || env.SMTP_PORT == '' || env.SMTP_USERNAME == '' || env.SMTP_PASSWORD == '' || env.ALERT_EMAIL == '')
        run: echo "::notice::SMTP secrets are incomplete; email notification skipped."

      - name: Fail after merge conflict
        if: steps.merge.outputs.conflict == 'true'
        run: |
          echo "::error::Upstream merge conflict detected. Merge was aborted, notification steps completed, and image build was skipped."
          exit 1

      - name: Push synced main branch
        if: steps.merge.outputs.changed == 'true'
        run: git push origin "HEAD:${TARGET_BRANCH}"

      - name: Prepare image metadata
        if: steps.merge.outputs.changed == 'true'
        id: image
        run: |
          owner_lowercase="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          short_sha="$(git rev-parse --short=12 HEAD)"
          image="ghcr.io/${owner_lowercase}/new-api"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "Image: ${image}"
          echo "Short SHA: ${short_sha}"

      - name: Set up Docker Buildx
        if: steps.merge.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.merge.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push custom image
        if: steps.merge.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:sha-${{ steps.image.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
