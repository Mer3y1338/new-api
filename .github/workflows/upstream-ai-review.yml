name: Review upstream changes with AI

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/QuantumNous/new-api.git || true
          git fetch upstream main

      - name: Generate upstream diff
        id: changes
        run: |
          mkdir -p upstream-review

          git log --oneline HEAD..upstream/main > upstream-review/commits.txt || true
          git diff --name-status HEAD..upstream/main > upstream-review/files.txt || true
          git diff --stat HEAD..upstream/main > upstream-review/stat.txt || true
          git diff HEAD..upstream/main > upstream-review/diff.patch || true

          if [ ! -s upstream-review/commits.txt ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Upstream AI Review"
              echo
              echo "当前 fork 已经包含 upstream/main 的最新提交，没有需要审查的新更新。"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          {
            echo "# Upstream Review Input"
            echo
            echo "## Upstream commits"
            cat upstream-review/commits.txt
            echo
            echo "## Changed files"
            cat upstream-review/files.txt
            echo
            echo "## Diff stat"
            cat upstream-review/stat.txt
          } > upstream-review/summary.md

          {
            echo "## Upstream changes detected"
            echo
            echo "### Commits"
            echo '```txt'
            cat upstream-review/commits.txt
            echo '```'
            echo
            echo "### Changed files"
            echo '```txt'
            cat upstream-review/files.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Review with Claude Code
        if: steps.changes.outputs.has_changes == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          prompt: |
            你现在只做代码审查，不要修改任何文件，不要提交代码，不要创建分支，不要创建 PR。

            这是我的 New API fork 仓库。
            我自己主要改了前端 UI，尤其是 web/default 相关内容。
            现在需要你审查 upstream/main 相比当前 fork main 的更新风险。

            请阅读这些文件：
            - upstream-review/summary.md
            - upstream-review/files.txt
            - upstream-review/stat.txt
            - upstream-review/diff.patch

            请用中文输出审查报告，格式必须如下：

            ## 1. 本次 upstream 更新概览

            简短说明这次官方更新主要改了什么。

            ## 2. 主要改动文件

            按模块列出，例如：
            - 前端
            - 后端
            - 构建 / Docker / Actions
            - 依赖
            - 文档

            ## 3. 是否影响前端 UI

            明确回答：是 / 否 / 不确定。
            如果是，请说明影响哪些文件。

            ## 4. 是否影响 web/default

            明确回答：是 / 否 / 不确定。

            ## 5. 是否影响 web/classic

            明确回答：是 / 否 / 不确定。

            ## 6. 是否影响 Dockerfile、构建流程、依赖锁文件

            明确回答：是 / 否 / 不确定。

            ## 7. 是否影响后端核心逻辑

            重点关注：
            - controller
            - model
            - relay
            - router
            - middleware
            - common

            ## 8. 是否可能影响我的“洛音云枢”自定义主题

            明确说明是否可能冲突、是否可能覆盖我的首页、导航栏、样式或构建入口。

            ## 9. 风险等级

            只能从下面三个里选一个：
            - LOW
            - MEDIUM
            - HIGH

            ## 10. 建议

            只能从下面三个里选一个：
            - 可以自动合并
            - 建议手动检查后合并
            - 不建议自动合并

            不要泛泛而谈，要基于 diff 内容判断。
          claude_args: "--model ${{ secrets.ANTHROPIC_MODEL }} --max-turns 1"
          display_report: "true"