name: Mirror upstream release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Upstream release tag to mirror. Leave empty to use latest upstream release."
        required: false
        type: string
  schedule:
    # 每天北京时间 05:40 检查官方最新 Release
    - cron: "40 21 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: mirror-upstream-release
  cancel-in-progress: false

env:
  UPSTREAM_REPOSITORY: QuantumNous/new-api

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out fork main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve upstream release
        id: upstream_release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_MIRROR_TOKEN || secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_TAG}" ]; then
            gh api "repos/${UPSTREAM_REPOSITORY}/releases/tags/${INPUT_TAG}" > upstream-release.json
          else
            gh api "repos/${UPSTREAM_REPOSITORY}/releases/latest" > upstream-release.json
          fi

          {
            python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("upstream-release.json").read_text(encoding="utf-8"))
          Path("upstream-release-body.md").write_text(data.get("body") or "", encoding="utf-8")

          values = {
              "tag": data["tag_name"],
              "name": data.get("name") or data["tag_name"],
              "html_url": data.get("html_url") or "",
              "prerelease": "true" if data.get("prerelease") else "false",
          }
          for key, value in values.items():
              safe = str(value).replace("\n", " ")
              print(f"{key}={safe}")
          PY
          } >> "$GITHUB_OUTPUT"

      - name: Fetch upstream release tag
        id: upstream_tag
        run: |
          set -euo pipefail

          TAG="${{ steps.upstream_release.outputs.tag }}"
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch upstream "refs/tags/${TAG}:refs/upstream-release-tags/${TAG}" --force

          UPSTREAM_TAG_COMMIT="$(git rev-list -n 1 "refs/upstream-release-tags/${TAG}")"
          RELEASE_COMMIT=""

          while read -r COMMIT; do
            if git merge-base --is-ancestor "${UPSTREAM_TAG_COMMIT}" "${COMMIT}"; then
              RELEASE_COMMIT="${COMMIT}"
              break
            fi
          done < <(git rev-list --first-parent --reverse HEAD)

          if [ -z "${RELEASE_COMMIT}" ]; then
            {
              echo "## 官方 Release 对应提交尚未同步"
              echo
              echo "官方 Release tag \`${TAG}\` 对应的提交还不在本 fork 的 \`main\` 里。"
              echo
              echo "先让上游同步 PR 合并，再重新运行这个 workflow。"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Fork main does not contain upstream release tag ${TAG}. Sync upstream first."
            exit 1
          fi

          echo "upstream_commit=${UPSTREAM_TAG_COMMIT}" >> "$GITHUB_OUTPUT"
          echo "fork_commit=${RELEASE_COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Create fork tag if needed
        id: fork_tag
        env:
          MIRROR_TOKEN: ${{ secrets.RELEASE_MIRROR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ steps.upstream_release.outputs.tag }}"
          FORK_COMMIT="${{ steps.upstream_tag.outputs.fork_commit }}"

          git remote set-url origin "https://x-access-token:${MIRROR_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin "refs/tags/${TAG}:refs/fork-existing-tags/${TAG}" --force || true

          if git rev-parse "refs/fork-existing-tags/${TAG}" >/dev/null 2>&1; then
            EXISTING_COMMIT="$(git rev-list -n 1 "refs/fork-existing-tags/${TAG}")"
            if [ "${EXISTING_COMMIT}" != "${FORK_COMMIT}" ]; then
              echo "::error::Fork tag ${TAG} already exists at ${EXISTING_COMMIT}, expected fork main ${FORK_COMMIT}. Refusing to retag automatically."
              exit 1
            fi
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag -a "${TAG}" -m "Fork release ${TAG}" "${FORK_COMMIT}"
            git push origin "refs/tags/${TAG}"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update fork release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_MIRROR_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.upstream_release.outputs.tag }}
          NAME: ${{ steps.upstream_release.outputs.name }}
          UPSTREAM_URL: ${{ steps.upstream_release.outputs.html_url }}
          PRERELEASE: ${{ steps.upstream_release.outputs.prerelease }}
          UPSTREAM_COMMIT: ${{ steps.upstream_tag.outputs.upstream_commit }}
          FORK_COMMIT: ${{ steps.upstream_tag.outputs.fork_commit }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          from pathlib import Path

          upstream_body = Path("upstream-release-body.md").read_text(encoding="utf-8")
          notes = "\n".join([
              f"这是 CharyeahOwO/new-api 基于官方 **{os.environ['TAG']}** 的定制版发布。",
              "",
              f"- 官方 Release：{os.environ['UPSTREAM_URL']}",
              f"- 官方 Release 提交：`{os.environ['UPSTREAM_COMMIT']}`",
              f"- 本 fork 发布提交：`{os.environ['FORK_COMMIT']}`",
              "- 这个 Release 包含本仓库的前端定制，同时已经合入对应官方 Release 提交。",
              "",
              "---",
              "",
          ]) + upstream_body + "\n"
          Path("fork-release-notes.md").write_text(notes, encoding="utf-8")
          PY

          args=("${TAG}" --repo "${GITHUB_REPOSITORY}" --title "${NAME}" --notes-file fork-release-notes.md)
          if [ "${PRERELEASE}" = "true" ]; then
            args+=(--prerelease)
          else
            args+=(--latest)
          fi

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${args[@]}"
          else
            gh release create "${args[@]}"
          fi

      - name: Dispatch GHCR image build
        env:
          GH_TOKEN: ${{ secrets.RELEASE_MIRROR_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.upstream_release.outputs.tag }}
        run: |
          gh workflow run build-image.yml --repo "${GITHUB_REPOSITORY}" -f tag="${TAG}"

      - name: Summary
        run: |
          {
            echo "## 已镜像官方 Release"
            echo
            echo "- Tag: \`${{ steps.upstream_release.outputs.tag }}\`"
            echo "- 官方 Release 提交: \`${{ steps.upstream_tag.outputs.upstream_commit }}\`"
            echo "- 本 fork 发布提交: \`${{ steps.upstream_tag.outputs.fork_commit }}\`"
            echo "- 新 tag 创建: \`${{ steps.fork_tag.outputs.created }}\`"
            echo
            echo "Release 和 GHCR 镜像只跟官方 Release 走；上游提交同步仍由 PR workflow 负责。"
          } >> "$GITHUB_STEP_SUMMARY"
