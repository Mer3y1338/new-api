name: Open upstream sync PR

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间 04:10
    - cron: "10 20 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: upstream-sync-pr
  cancel-in-progress: false

jobs:
  sync-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out fork main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/QuantumNous/new-api.git || true
          git fetch upstream main

      - name: Check upstream changes
        id: changes
        run: |
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Upstream Sync"
              echo
              echo "当前 fork 已经包含 upstream/main 的最新提交，没有需要创建 PR 的更新。"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          mkdir -p upstream-review
          git log --oneline HEAD..upstream/main > upstream-review/commits.txt
          git diff --name-status HEAD..upstream/main > upstream-review/files.txt
          git diff --stat HEAD..upstream/main > upstream-review/stat.txt
          git diff HEAD..upstream/main > upstream-review/diff.patch

          {
            echo "## Upstream updates detected"
            echo
            echo "### Commits"
            echo '```txt'
            cat upstream-review/commits.txt
            echo '```'
            echo
            echo "### Changed files"
            echo '```txt'
            cat upstream-review/files.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create sync branch and merge upstream
        if: steps.changes.outputs.has_changes == 'true'
        id: merge
        run: |
          BRANCH="sync/upstream-main"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          git checkout -B "$BRANCH" origin/main

          set +e
          git merge upstream/main --no-edit
          CODE=$?
          set -e

          if [ "$CODE" -ne 0 ]; then
            echo "conflict=true" >> "$GITHUB_OUTPUT"

            git diff --name-only --diff-filter=U > upstream-review/conflict-files.txt || true

            {
              echo "## Merge conflict"
              echo
              echo "合并 upstream/main 时出现冲突，未创建同步 PR。"
              echo
              echo "### Conflict files"
              echo '```txt'
              cat upstream-review/conflict-files.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            git merge --abort || true
            exit 0
          fi

          echo "conflict=false" >> "$GITHUB_OUTPUT"

      - name: Create conflict issue
        if: steps.changes.outputs.has_changes == 'true' && steps.merge.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY_FILE="$(mktemp)"

          {
            echo "自动同步 upstream/main 时出现合并冲突。"
            echo
            echo "请手动处理以下冲突文件："
            echo
            echo '```txt'
            cat upstream-review/conflict-files.txt
            echo '```'
            echo
            echo "Actions Run:"
            echo "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > "$BODY_FILE"

          gh issue create \
            --title "Upstream sync conflict" \
            --body-file "$BODY_FILE" \
            --label "upstream-sync,merge-conflict" || true

      - name: Stop on conflict
        if: steps.changes.outputs.has_changes == 'true' && steps.merge.outputs.conflict == 'true'
        run: |
          echo "Merge conflict detected. Stop workflow."
          exit 1

      - name: Push sync branch
        if: steps.changes.outputs.has_changes == 'true' && steps.merge.outputs.conflict != 'true'
        run: |
          git push --force-with-lease origin "${{ steps.merge.outputs.branch }}"

      - name: Create or update PR
        if: steps.changes.outputs.has_changes == 'true' && steps.merge.outputs.conflict != 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ steps.merge.outputs.branch }}"

          BODY_FILE="$(mktemp)"

          {
            echo "## Upstream sync"
            echo
            echo "这个 PR 是自动同步官方 upstream/main 生成的。"
            echo
            echo "### Upstream commits"
            echo '```txt'
            cat upstream-review/commits.txt
            echo '```'
            echo
            echo "### Changed files"
            echo '```txt'
            cat upstream-review/files.txt
            echo '```'
            echo
            echo "### Diff stat"
            echo '```txt'
            cat upstream-review/stat.txt
            echo '```'
            echo
            echo "Actions Run:"
            echo "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > "$BODY_FILE"

          EXISTING_PR="$(gh pr list --state open --head "$BRANCH" --json number --jq '.[0].number // empty')"

          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" \
              --title "Sync upstream/main" \
              --body-file "$BODY_FILE"
            PR_NUMBER="$EXISTING_PR"
          else
            PR_URL="$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Sync upstream/main" \
              --body-file "$BODY_FILE" \
              --label "upstream-sync")"
            PR_NUMBER="$(gh pr view "$PR_URL" --json number --jq '.number')"
          fi

          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          {
            echo "## Pull Request"
            echo
            echo "已创建或更新 PR：#${PR_NUMBER}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: AI review upstream PR
        if: steps.changes.outputs.has_changes == 'true' && steps.merge.outputs.conflict != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          prompt: |
            你现在只做代码审查，不要修改任何文件，不要提交代码，不要创建分支。

            这是我的 New API fork 仓库。
            当前 workflow 已经把 upstream/main 合并到了同步分支，并创建了 PR。

            PR 编号是：${{ steps.pr.outputs.number }}

            请阅读这些文件：
            - upstream-review/commits.txt
            - upstream-review/files.txt
            - upstream-review/stat.txt
            - upstream-review/diff.patch

            请用中文输出审查报告，格式如下：

            ## 1. 本次 upstream 更新概览

            ## 2. 主要改动文件

            ## 3. 是否影响前端 UI

            ## 4. 是否影响 web/default

            ## 5. 是否影响 web/classic

            ## 6. 是否影响 Dockerfile、构建流程、依赖锁文件

            ## 7. 是否影响后端核心逻辑

            重点关注：
            - controller
            - model
            - relay
            - router
            - middleware
            - common

            ## 8. 是否可能影响我的“洛音云枢”自定义主题

            ## 9. 风险等级

            只能选：
            - LOW
            - MEDIUM
            - HIGH

            ## 10. 建议

            只能选：
            - 可以自动合并
            - 建议手动检查后合并
            - 不建议自动合并

            不要泛泛而谈，要基于 diff 内容判断。
          claude_args: "--model ${{ secrets.ANTHROPIC_MODEL }} --max-turns 1"
          display_report: "true"