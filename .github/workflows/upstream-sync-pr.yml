name: Open upstream sync PR

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to sync from upstream"
        required: false
        default: main
        type: string
      skip_ai_review:
        description: "Create the sync PR without calling the AI reviewer"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Run checks without pushing a branch, creating issues, or opening a PR"
        required: false
        default: false
        type: boolean
  schedule:
    # 每天北京时间 04:10
    - cron: "10 20 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: upstream-sync-pr-${{ github.event.inputs.target_branch || 'main' }}
  cancel-in-progress: false

env:
  UPSTREAM_URL: https://github.com/QuantumNous/new-api.git
  TARGET_BRANCH: ${{ github.event.inputs.target_branch || 'main' }}
  DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
  SKIP_AI_REVIEW: ${{ github.event.inputs.skip_ai_review || 'false' }}

jobs:
  sync-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out fork main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_BRANCH }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate inputs
        run: |
          if [ -z "$TARGET_BRANCH" ] || ! git check-ref-format --branch "$TARGET_BRANCH" >/dev/null 2>&1; then
            echo "::error::Invalid target branch: ${TARGET_BRANCH}"
            exit 1
          fi

          echo "Sync target branch: ${TARGET_BRANCH}"
          echo "Dry run: ${DRY_RUN}"
          echo "Skip AI review: ${SKIP_AI_REVIEW}"

      - name: Ensure labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ensure_label() {
            local name="$1"
            local color="$2"
            local description="$3"

            if gh label view "$name" >/dev/null 2>&1; then
              gh label edit "$name" --color "$color" --description "$description" \
                || echo "::warning::Failed to update label: ${name}"
            else
              gh label create "$name" --color "$color" --description "$description" \
                || echo "::warning::Failed to create label: ${name}"
            fi
          }

          ensure_label "upstream-sync" "0969da" "Sync updates from upstream"
          ensure_label "merge-conflict" "d1242f" "Upstream merge conflict"
          ensure_label "ai-reviewed" "8250df" "Reviewed by AI"
          ensure_label "ai-review-failed" "bf8700" "AI review was skipped or failed"
          ensure_label "risk-low" "2da44e" "Low risk upstream sync"
          ensure_label "risk-medium" "bf8700" "Medium risk upstream sync"
          ensure_label "risk-high" "d1242f" "High risk upstream sync"
          ensure_label "ai-repaired" "5319e7" "Merge conflicts were repaired by the AI runner"
          ensure_label "touches-luoyin" "d93f0b" "Touches local LuoYin frontend customization"
          ensure_label "touches-web-default" "1d76db" "Touches the default frontend"
          ensure_label "touches-web-classic" "006b75" "Touches the classic frontend"
          ensure_label "touches-frontend-deps" "fbca04" "Touches frontend dependencies or lockfiles"
          ensure_label "touches-workflow" "c5def5" "Touches GitHub Actions or workflow files"
          ensure_label "backend-ignored" "6e7781" "Backend changes are intentionally ignored by this frontend-focused sync policy"

      - name: Add and fetch upstream
        run: |
          git fetch --prune origin "+refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}"

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "$UPSTREAM_URL"
          else
            git remote add upstream "$UPSTREAM_URL"
          fi

          git fetch --prune upstream "+refs/heads/${TARGET_BRANCH}:refs/remotes/upstream/${TARGET_BRANCH}"

      - name: Check upstream changes
        id: changes
        run: |
          UPSTREAM_REF="upstream/${TARGET_BRANCH}"
          BASE="$(git merge-base HEAD "$UPSTREAM_REF")"
          UPSTREAM_SHA="$(git rev-parse "$UPSTREAM_REF")"
          FORK_SHA="$(git rev-parse HEAD)"

          {
            echo "base_sha=${BASE}"
            echo "upstream_sha=${UPSTREAM_SHA}"
            echo "fork_sha=${FORK_SHA}"
          } >> "$GITHUB_OUTPUT"

          if [ "$BASE" = "$UPSTREAM_SHA" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"

            {
              echo "## Upstream Sync"
              echo
              echo "当前 fork 已经包含 upstream/${TARGET_BRANCH} 的最新提交，没有需要创建 PR 的更新。"
            } >> "$GITHUB_STEP_SUMMARY"

            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          mkdir -p upstream-review

          git log --oneline "${BASE}..${UPSTREAM_REF}" > upstream-review/commits.txt
          git diff --name-status "${BASE}..${UPSTREAM_REF}" > upstream-review/files.txt
          git diff --name-only "${BASE}..${UPSTREAM_REF}" > upstream-review/file-paths.txt
          git diff --stat "${BASE}..${UPSTREAM_REF}" > upstream-review/stat.txt
          git diff "${BASE}..${UPSTREAM_REF}" > upstream-review/diff.patch
          git diff --name-status "${BASE}..${UPSTREAM_REF}" -- web/default web/classic .github/workflows > upstream-review/frontend-files.txt || true
          git diff "${BASE}..${UPSTREAM_REF}" -- web/default web/classic .github/workflows > upstream-review/frontend-diff.patch || true

          {
            echo "Target branch: ${TARGET_BRANCH}"
            echo "Fork sha: ${FORK_SHA}"
            echo "Upstream sha: ${UPSTREAM_SHA}"
            echo "Merge base: ${BASE}"
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > upstream-review/metadata.txt

          python3 - <<'PY'
          import os
          from pathlib import Path

          for name in ("diff.patch", "frontend-diff.patch"):
              patch = Path("upstream-review") / name
              out = Path("upstream-review") / name.replace(".patch", "-truncated.patch")

              text = patch.read_text(errors="replace") if patch.exists() else ""
              limit = 80_000

              if len(text) > limit:
                  text = text[:limit] + "\n\n[DIFF 已截断：原始 diff 过大，只保留前 80000 字符用于 AI 审查]\n"

              out.write_text(text)
          PY

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          files_text = Path("upstream-review/files.txt").read_text(errors="replace").splitlines()

          entries = []
          paths = []

          for line in files_text:
              if not line.strip():
                  continue

              parts = line.split("\t")
              status = parts[0]

              if status.startswith("R") and len(parts) >= 3:
                  file_paths = parts[1:3]
              else:
                  file_paths = parts[1:]

              entries.append((status, file_paths))
              paths.extend(file_paths)

          unique_paths = sorted(set(paths))

          def has_prefix(*prefixes):
              return any(path.startswith(prefixes) for path in unique_paths)

          def has_exact(*names):
              return any(path in names for path in unique_paths)

          def has_suffix(*suffixes):
              return any(path.endswith(suffixes) for path in unique_paths)

          def path_contains_any(*needles):
              lowered = [path.lower() for path in unique_paths]
              return any(any(needle.lower() in path for needle in needles) for path in lowered)

          root_doc_files = {"README.md", "CHANGELOG.md", "CONTRIBUTING.md", "SECURITY.md", "LICENSE"}
          docs_suffixes = (".md", ".mdx", ".txt")
          docs_prefixes = ("docs/", ".github/ISSUE_TEMPLATE/", ".github/PULL_REQUEST_TEMPLATE")
          docs_only = bool(unique_paths) and all(
              path.startswith(docs_prefixes)
              or path in root_doc_files
              or ("/" not in path and path.endswith(docs_suffixes))
              for path in unique_paths
          )

          ignored_backend_prefixes = (
              "controller/", "model/", "relay/", "router/", "middleware/",
              "common/", "service/", "setting/", "dto/", "constant/",
              "types/", "pkg/", "i18n/", "oauth/",
          )

          impact = {
              "web_default": has_prefix("web/default/"),
              "web_classic": has_prefix("web/classic/"),
              "luoyin": path_contains_any("luoyin", "洛音", "云枢", "luotianyi")
                  or has_prefix("web/default/src/custom/luoyin/"),
              "workflow": has_prefix(".github/workflows/"),
              "frontend_dependency": has_exact("web/default/package.json", "web/default/bun.lock")
                  or has_suffix("package.json", "bun.lock", "pnpm-lock.yaml", "package-lock.json", "yarn.lock"),
              "frontend_build": has_exact("web/default/rsbuild.config.ts", "web/default/vite.config.ts", "web/default/vite.config.js")
                  or has_prefix("web/default/public/"),
              "backend_ignored": has_prefix(*ignored_backend_prefixes) or has_exact("go.mod", "go.sum"),
          }

          high_risk_frontend_files = {
              "web/default/src/main.tsx",
              "web/default/src/App.tsx",
              "web/default/src/router.tsx",
              "web/default/src/routes.tsx",
              "web/default/src/index.css",
              "web/default/src/styles/index.css",
              "web/default/src/styles/theme.css",
              "web/default/src/lib/theme-customization.ts",
              "web/default/tailwind.config.js",
              "web/default/tailwind.config.ts",
              "web/default/package.json",
              "web/default/bun.lock",
              ".github/workflows/upstream-sync-pr.yml",
          }

          has_high_risk_frontend_path = any(path in high_risk_frontend_files for path in unique_paths)
          has_deleted_frontend = any(
              status.startswith("D") and any(path.startswith(("web/default/", "web/classic/")) for path in file_paths)
              for status, file_paths in entries
          )

          if docs_only:
              risk = "LOW"
              reason = "Only documentation changed; backend is ignored by sync policy."
          elif impact["luoyin"] or has_high_risk_frontend_path or has_deleted_frontend or impact["workflow"] or impact["frontend_dependency"]:
              risk = "HIGH"
              reason = "High-impact frontend/theme/workflow/dependency files changed; backend paths are intentionally ignored."
          elif impact["web_default"] or impact["web_classic"] or impact["frontend_build"]:
              risk = "MEDIUM"
              reason = "Frontend files changed; merge/combine upstream unless it overwrites local frontend customization."
          else:
              risk = "LOW"
              reason = "No frontend/theme/workflow/dependency risk paths detected; backend-only changes are ignored by policy and should be merged."

          label = {
              "LOW": "risk-low",
              "MEDIUM": "risk-medium",
              "HIGH": "risk-high",
          }[risk]

          module_lines = [
              f"- web/default: {'yes' if impact['web_default'] else 'no'}",
              f"- web/classic: {'yes' if impact['web_classic'] else 'no'}",
              f"- luoyin theme/customization: {'yes' if impact['luoyin'] else 'no'}",
              f"- frontend build/assets: {'yes' if impact['frontend_build'] else 'no'}",
              f"- frontend dependencies: {'yes' if impact['frontend_dependency'] else 'no'}",
              f"- GitHub Actions: {'yes' if impact['workflow'] else 'no'}",
              f"- backend paths: {'ignored-by-policy' if impact['backend_ignored'] else 'no'}",
              f"- docs only: {'yes' if docs_only else 'no'}",
          ]

          merge_advice = "需要结合" if risk == "HIGH" else "可以合并"

          miya_summary = {
              "schema": "newapi-upstream-sync-v1",
              "policy": {
                  "owner_changes_scope": "frontend-only",
                  "backend_review": "ignored-by-policy",
                  "allowed_resolution": ["merge", "combine"],
                  "discard_upstream_allowed": False,
                  "default_rule": "merge official upstream frontend changes unless they conflict with local frontend customization; combine on conflicts",
              },
              "decision": {
                  "risk": risk,
                  "risk_label": label,
                  "merge_advice": merge_advice,
                  "reason": reason,
              },
              "touches": impact,
              "files": {
                  "changed_count": len(unique_paths),
                  "changed_paths": unique_paths[:80],
                  "truncated": len(unique_paths) > 80,
              },
              "recommended_checks": [
                  "web/default typecheck" if impact["web_default"] else "frontend smoke check if UI changed",
                  "web/default build" if impact["web_default"] or impact["frontend_dependency"] else "none",
              ],
          }

          Path("upstream-review/miya-summary-base.json").write_text(
              json.dumps(miya_summary, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          impact_md = "\n".join([
              "## Automatic impact analysis",
              "",
              f"- Risk: {risk}",
              f"- Label: {label}",
              f"- Merge advice: {merge_advice}",
              f"- Reason: {reason}",
              "- Backend policy: ignored; MuLing only maintains frontend customization on this fork.",
              "- Conflict policy: only merge or combine; never discard upstream updates.",
              "",
              "### Module signals",
              *module_lines,
              "",
              "### File count",
              f"- Changed files: {len(unique_paths)}",
          ])

          Path("upstream-review/impact.md").write_text(impact_md + "\n", encoding="utf-8")

          def write_output(name, value):
              value = str(value)
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
                  if "\n" in value:
                      f.write(f"{name}<<EOF\n{value}\nEOF\n")
                  else:
                      f.write(f"{name}={value}\n")

          write_output("risk_level", risk)
          write_output("risk_label", label)
          write_output("impact_reason", reason)
          write_output("impact_summary", impact_md)
          write_output("merge_advice", merge_advice)
          write_output("touches_luoyin", str(impact["luoyin"]).lower())
          write_output("touches_web_default", str(impact["web_default"]).lower())
          write_output("touches_web_classic", str(impact["web_classic"]).lower())
          write_output("touches_frontend_dependency", str(impact["frontend_dependency"]).lower())
          write_output("touches_workflow", str(impact["workflow"]).lower())
          write_output("backend_ignored", str(impact["backend_ignored"]).lower())
          PY

          {
            echo "# Upstream Review Input"
            echo
            cat upstream-review/metadata.txt
            echo
            cat upstream-review/impact.md
            echo
            echo "## Upstream commits"
            cat upstream-review/commits.txt
            echo
            echo "## Changed files"
            cat upstream-review/files.txt
            echo
            echo "## Diff stat"
            cat upstream-review/stat.txt
          } > upstream-review/summary.md

          {
            echo "## Upstream updates detected"
            echo
            echo "### Commits"
            echo '```txt'
            cat upstream-review/commits.txt
            echo '```'
            echo
            echo "### Changed files"
            echo '```txt'
            cat upstream-review/files.txt
            echo '```'
            echo
            cat upstream-review/impact.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create sync branch and merge upstream
        if: steps.changes.outputs.has_changes == 'true'
        id: merge
        run: |
          SAFE_BRANCH_NAME="${TARGET_BRANCH//\//-}"
          BRANCH="sync/upstream-${SAFE_BRANCH_NAME}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          git checkout -B "$BRANCH" "origin/${TARGET_BRANCH}"

          set +e
          git merge --no-edit "upstream/${TARGET_BRANCH}"
          CODE=$?
          set -e

          if [ "$CODE" -ne 0 ]; then
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            echo "merge_conflict=true" >> "$GITHUB_OUTPUT"

            git diff --name-only --diff-filter=U > upstream-review/conflict-files.txt || true

            if [ ! -s upstream-review/conflict-files.txt ]; then
              echo "(No unmerged files were reported by git diff --diff-filter=U.)" > upstream-review/conflict-files.txt
            fi

            CONFLICT_COUNT="$(grep -cv '^$' upstream-review/conflict-files.txt || true)"
            echo "conflict_count=${CONFLICT_COUNT}" >> "$GITHUB_OUTPUT"

            if [ "$CONFLICT_COUNT" -gt 20 ]; then
              echo "repair_abandoned=true" >> "$GITHUB_OUTPUT"
            else
              echo "repair_abandoned=false" >> "$GITHUB_OUTPUT"
            fi

            {
              echo "## Merge conflict"
              echo
              echo "合并 upstream/${TARGET_BRANCH} 时出现冲突，已保留冲突状态供自动修复。"
              echo
              echo "### Conflict files (${CONFLICT_COUNT})"
              echo '```txt'
              cat upstream-review/conflict-files.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            exit 0
          fi

          git diff --name-status "origin/${TARGET_BRANCH}..HEAD" > upstream-review/merge-files.txt
          git diff --stat "origin/${TARGET_BRANCH}..HEAD" > upstream-review/merge-stat.txt

          echo "conflict=false" >> "$GITHUB_OUTPUT"
          echo "merge_conflict=false" >> "$GITHUB_OUTPUT"
          echo "conflict_count=0" >> "$GITHUB_OUTPUT"
          echo "repair_abandoned=false" >> "$GITHUB_OUTPUT"

      - name: Repair merge conflicts with Claude Code
        if: steps.changes.outputs.has_changes == 'true' && steps.merge.outputs.merge_conflict == 'true' && steps.merge.outputs.repair_abandoned != 'true' && env.DRY_RUN != 'true'
        id: claude_code_repair
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          github_token: ${{ github.token }}
          prompt: |
            You are repairing an upstream merge conflict in this GitHub Actions job.

            Requirements:
            - MuLing only maintains frontend customization in this fork. Treat backend changes as upstream-owned and do not perform backend review or redesign.
            - First inspect the latest commit on this branch, then inspect adjacent code only as needed.
            - Only resolve files listed by `git diff --name-only --diff-filter=U`.
            - Do not modify unrelated files.
            - Remove every conflict marker: `<<<<<<<`, `=======`, `>>>>>>>`.
            - There are only two valid conflict resolutions: merge both sides or combine both sides. There is no valid option that discards upstream updates.
            - For frontend conflicts, preserve local “洛音云枢” brand, footer/legal links/project attribution, theme customization, and i18n customization, while integrating upstream frontend fixes/features around it.
            - For backend conflicts, keep upstream behavior and mechanically combine local context only when required to compile; do not analyze, rewrite, or optimize backend logic.
            - Official upstream frontend changes that do not conflict with local customization should be accepted.
            - Do not force push.
            - Do not change secrets, environment variables, deploy keys, credentials, or release tokens.
            - Do not perform broad refactors.
            - After resolving conflicts, run `git diff --check`.
            - When no unmerged files remain, run `git add` for only the conflicted files and commit with exactly: `chore: resolve upstream merge conflicts`.
            - Write a concise repair summary to `upstream-review/ai-repair.md` including conflicted files, repaired files, and whether any non-conflict file was modified.

            Suggested workflow:
            1. Run `git status --short` and `git diff --name-only --diff-filter=U`.
            2. Read only the conflicted files and nearby context needed to resolve them.
            3. Edit only those conflicted files.
            4. Verify no conflict markers remain in those files.
            5. Run `git diff --check`.
            6. Run `git add` for the conflicted files, then commit.
            7. Write `upstream-review/ai-repair.md` with what you resolved and any uncertainty.
          claude_args: |
            --model ${{ secrets.ANTHROPIC_MODEL }}
            --max-turns 80
            --allowedTools "Read,Grep,Glob,Edit,MultiEdit,Write,Bash(git status:*),Bash(git diff:*),Bash(git add:*),Bash(git commit:*),Bash(rg:*),Bash(sed:*),Bash(head:*),Bash(cat:*)"

      - name: Create conflict issue
        if: steps.changes.outputs.has_changes == 'true' && steps.merge.outputs.merge_conflict == 'true' && steps.merge.outputs.repair_abandoned == 'true' && env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY_FILE="$(mktemp)"
          TITLE="Upstream sync conflict on ${TARGET_BRANCH}"
          export TITLE

          {
            echo "自动同步 upstream/${TARGET_BRANCH} 时出现合并冲突，冲突文件超过 20 个，已自动放弃 Claude Code 修复。"
            echo
            echo "- Upstream: ${UPSTREAM_URL}"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Fork commit before sync: ${GITHUB_SHA}"
            echo
            echo "请手动处理以下冲突文件："
            echo
            echo '```txt'
            cat upstream-review/conflict-files.txt
            echo '```'
          } > "$BODY_FILE"

          EXISTING_ISSUE="$(
            gh issue list \
              --state open \
              --label "upstream-sync" \
              --label "merge-conflict" \
              --json number,title \
              --limit 50 |
            python3 -c 'import json, os, sys; title=os.environ["TITLE"]; issues=json.load(sys.stdin); print(next((str(i["number"]) for i in issues if i.get("title") == title), ""))'
          )"

          if [ -n "$EXISTING_ISSUE" ]; then
            gh issue comment "$EXISTING_ISSUE" --body-file "$BODY_FILE"
            echo "Updated existing conflict issue #${EXISTING_ISSUE}."
          else
            gh issue create \
              --title "$TITLE" \
              --body-file "$BODY_FILE" \
              --label "upstream-sync,merge-conflict"
          fi

      - name: Validate repaired merge conflicts
        if: steps.changes.outputs.has_changes == 'true' && steps.merge.outputs.merge_conflict == 'true' && steps.merge.outputs.repair_abandoned != 'true' && env.DRY_RUN != 'true'
        id: repair_validation
        run: |
          git diff --check

          git diff --name-only --diff-filter=U > upstream-review/remaining-conflicts.txt || true

          if [ -s upstream-review/remaining-conflicts.txt ]; then
            {
              echo "## Merge conflict repair failed"
              echo
              echo "Claude Code repair completed, but unmerged files remain:"
              echo
              echo '```txt'
              cat upstream-review/remaining-conflicts.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            echo "::error::Merge conflicts remain after Claude Code repair."
            exit 1
          fi

          git status --short
          git diff --name-status "origin/${TARGET_BRANCH}..HEAD" > upstream-review/merge-files.txt
          git diff --stat "origin/${TARGET_BRANCH}..HEAD" > upstream-review/merge-stat.txt
          echo "resolved=true" >> "$GITHUB_OUTPUT"

      - name: Stop on conflict
        if: steps.changes.outputs.has_changes == 'true' && steps.merge.outputs.merge_conflict == 'true' && steps.merge.outputs.repair_abandoned == 'true' && env.DRY_RUN != 'true'
        run: |
          echo "::error::Merge conflict detected in more than 20 files. Automatic repair was not attempted."
          exit 1

      - name: Push sync branch
        if: steps.changes.outputs.has_changes == 'true' && (steps.merge.outputs.merge_conflict != 'true' || steps.repair_validation.outputs.resolved == 'true') && env.DRY_RUN != 'true'
        run: |
          git push --force-with-lease --set-upstream origin "${{ steps.merge.outputs.branch }}"

      - name: Build bounded Claude Code review prompt
        if: steps.changes.outputs.has_changes == 'true' && (steps.merge.outputs.merge_conflict != 'true' || steps.repair_validation.outputs.resolved == 'true')
        id: review_prompt
        env:
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          from textwrap import dedent

          metadata = Path("upstream-review/metadata.txt").read_text(errors="replace")
          commits = Path("upstream-review/commits.txt").read_text(errors="replace")
          summary = "\n".join([
              "# Frontend-scoped upstream review input",
              "",
              metadata,
              "",
              "## Upstream commits",
              commits,
          ])
          impact = Path("upstream-review/impact.md").read_text(errors="replace")
          files = Path("upstream-review/frontend-files.txt").read_text(errors="replace")
          if not files.strip():
              files = "(No frontend/workflow files changed; backend paths are ignored by policy.)\n"
          diff = Path("upstream-review/frontend-diff-truncated.patch").read_text(errors="replace")
          if not diff.strip():
              diff = "(No frontend/workflow diff provided; backend diff is intentionally omitted by policy.)\n"

          prompt = dedent(f"""
          你是这个 GitHub Actions 里的 Claude Code 上游同步审查 agent。

          你的目标：在完整仓库中进行一次“前端范围限定”的代码审查，然后把最终报告写入 `upstream-review/ai-review.md`。

          核心规则，必须遵守：
          - 慕棱明确只维护这个 fork 的前端自定义；不要审查后端，不要给后端风险结论，不要建议后端修复。
          - 上游更新的默认策略是能合就合；官方前端更新只要不冲突本地自定义就接受。
          - 冲突解决只有两个选项：合并、结合。没有放弃上游更新、粗暴 ours/theirs、丢弃官方改动这个选项。
          - 如果涉及后端路径，只写“后端按政策忽略，默认跟随上游”，不要继续展开。
          - 优先查看当前分支最新提交，再按需查看相邻前端代码上下文。
          - 只读审查，不要修改业务代码、配置、依赖、锁文件或 workflow。
          - 优先阅读 frontend changed files；为了确认主题影响，可以查看相关前端文件。
          - 不要读取 dist/build/vendor/node_modules。
          - 不要运行全量测试、构建、安装依赖、联网命令或格式化命令。
          - 允许使用 `git diff`、`git show`、`git grep`、`rg`、`sed`、`head`、`wc` 做小范围检查。
          - 你的最终动作只能写入 `upstream-review/ai-review.md`。
          - 如果信息不足，明确写“不确定”，不要编造。

          审查重点：
          - 是否影响我的自定义主题“洛音云枢”。
          - web/default、web/classic 是否被触及。
          - 官方前端更新是否能直接合并，还是需要和本地主题结合。
          - Docker、GitHub Actions、前端依赖锁、前端构建流程是否被触及。
          - 后端路径不要审查；只按政策说明已忽略。

          输出格式必须严格如下，且整体尽量短：

          Codex审查：用 1 句话总结本次 upstream 更新的前端性质、主要风险、是否需要维护者跟进。

          合并建议：只能选择一个：可以合并 / 需要结合。后面用一句话说明原因。不要输出拒绝合并、放弃上游、丢弃官方改动这类结论。

          更新文件：
          - 用 3 到 8 条列出主要前端更新模块和关键文件。
          - 如果文件很多，只列高风险或代表性文件。
          - 必须说明是否影响 web/default、web/classic、洛音云枢、前端依赖/构建/workflow。
          - 如果有后端文件，只写“后端路径按政策忽略，默认跟随上游”。

          下一步：
          用 1 到 2 句话说明 Miya/维护者下一步最应该做什么。

          Codex审查报告：

          ## 风险等级

          LOW / MEDIUM / HIGH，只能选一个，并说明前端原因。

          ## 我查看了什么

          列出你实际读取/搜索过的前端文件或命令，不超过 10 条。不要列后端文件。

          ## 影响范围

          简短说明洛音云枢主题、web/default、web/classic、前端依赖/构建/workflow 的影响；后端写“按政策忽略”。

          ## 重点文件

          只分析最重要的前端文件或模块，不要逐个展开所有低风险文件。

          ## 手动检查

          给出具体前端 checklist。

          ## 验证步骤

          给出最短可执行前端验证顺序。

          ---

          Codex审查：{os.environ.get("ANTHROPIC_MODEL") or "claude-code"}

          ===== upstream summary =====
          {summary}

          ===== automatic impact analysis =====
          {impact}

          ===== changed files =====
          {files}

          ===== truncated diff =====
          {diff}
          """)

          Path("upstream-review/claude-agent-prompt.md").write_text(prompt, encoding="utf-8")
          PY

      - name: Generate repo-aware review with Claude Code
        if: steps.changes.outputs.has_changes == 'true' && (steps.merge.outputs.merge_conflict != 'true' || steps.repair_validation.outputs.resolved == 'true') && env.SKIP_AI_REVIEW != 'true'
        id: claude_code_review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          github_token: ${{ github.token }}
          prompt: |
            Read `upstream-review/claude-agent-prompt.md` and follow it exactly.
            You may thoroughly inspect repository files needed for this review.
            Write the final report to `upstream-review/ai-review.md`.
          claude_args: |
            --model ${{ secrets.ANTHROPIC_MODEL }}
            --max-turns 50
            --allowedTools "Read,Grep,Glob,Write,Bash(git diff:*),Bash(git show:*),Bash(git grep:*),Bash(rg:*),Bash(sed:*),Bash(head:*),Bash(wc:*)"
            --disallowedTools "Edit,MultiEdit"

      - name: Finalize AI review
        if: steps.changes.outputs.has_changes == 'true' && (steps.merge.outputs.merge_conflict != 'true' || steps.repair_validation.outputs.resolved == 'true')
        id: ai_review
        env:
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          from textwrap import dedent

          status = "ok"
          review_path = Path("upstream-review/ai-review.md")

          if os.environ.get("SKIP_AI_REVIEW") == "true":
              status = "skipped"
              review = f"""
              Codex审查：本次 workflow_dispatch 选择跳过 AI 审查，请按前端范围查看同步信息后决定是否合并。

              合并建议：需要结合。原因是没有运行 repo-aware 前端审查。

              更新文件：
              - 见同步信息中的 changed files；后端路径按政策忽略，默认跟随上游。

              下一步：
              请检查 changed files 中的前端、主题、workflow、前端依赖/构建相关变更，确认没有覆盖洛音云枢自定义。

              Codex审查报告：

              ## 风险等级

              UNKNOWN：AI 审查已跳过。

              ## 我查看了什么

              - 未运行 Claude Code repo-aware 审查。

              ## 手动检查

              - [ ] 检查 changed files。
              - [ ] 检查是否影响 web/default、web/classic、洛音云枢主题、前端依赖/构建或 workflow。

              ---

              Codex审查：{os.environ.get("ANTHROPIC_MODEL") or "claude-code"}
              """
          elif not review_path.exists() or not review_path.read_text(encoding="utf-8", errors="replace").strip():
              status = "failed"
              review = f"""
              Codex审查：Claude Code repo-aware 前端审查没有产出报告，请展开同步信息按前端范围确认。

              合并建议：需要结合。原因是自动审查失败，但同步分支已经生成。

              更新文件：
              - 见同步信息中的 changed files；后端路径按政策忽略，默认跟随上游。

              下一步：
              请检查前端、主题、workflow、前端依赖/构建相关 changed files；必要时重新运行 workflow。

              Codex审查报告：

              ## 风险等级

              UNKNOWN：Claude Code 没有写出 `upstream-review/ai-review.md`。

              ## 我查看了什么

              - 自动审查未完成或未写出报告。

              ## 手动检查

              - [ ] 检查 changed files。
              - [ ] 检查是否影响 web/default、web/classic、洛音云枢主题、前端依赖/构建或 workflow。

              ---

              Codex审查：{os.environ.get("ANTHROPIC_MODEL") or "claude-code"}
              """
          else:
              review = review_path.read_text(encoding="utf-8", errors="replace")

          review_path.write_text(dedent(review).strip() + "\n", encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"status={status}\n")

          print(review_path.read_text(encoding="utf-8", errors="replace"))
          PY

      - name: Create or update PR with AI review in body
        if: steps.changes.outputs.has_changes == 'true' && (steps.merge.outputs.merge_conflict != 'true' || steps.repair_validation.outputs.resolved == 'true') && env.DRY_RUN != 'true'
