            else
              PR_NUMBER="$(gh pr view "$PR_URL" --repo "$GITHUB_REPOSITORY" --json number --jq '.number')"
            fi

            if [ -z "${PR_NUMBER:-}" ]; then
              {
                echo "## Pull Request creation failed"
                echo
                echo "同步分支已经推送成功，但没有拿到 PR 编号。"
                echo
                echo "- Branch: \`${BRANCH}\`"
                echo "- Base: \`${TARGET_BRANCH}\`"
                echo "- Body file: \`upstream-review/pr-body.md\`"
                echo
                echo "### Error"
                echo '```txt'
                cat upstream-review/pr-create-error.txt
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"

              echo "::error::PR may have been created, but PR number could not be resolved."
              exit 1
            fi
          fi

          add_label "$PR_NUMBER" "upstream-sync"
          add_label "$PR_NUMBER" "$RISK_LABEL"
          add_label "$PR_NUMBER" "$AI_LABEL"

          add_label_if_true() {
            local value="$1"
            local label="$2"
            if [ "$value" = "true" ]; then
              add_label "$PR_NUMBER" "$label"
            fi
          }

          add_label_if_true "$REPAIR_RESOLVED" "ai-repaired"
          add_label_if_true "$TOUCHES_LUOYIN" "touches-luoyin"
          add_label_if_true "$TOUCHES_WEB_DEFAULT" "touches-web-default"
          add_label_if_true "$TOUCHES_WEB_CLASSIC" "touches-web-classic"
          add_label_if_true "$TOUCHES_FRONTEND_DEPS" "touches-frontend-deps"
          add_label_if_true "$TOUCHES_WORKFLOW" "touches-workflow"
          add_label_if_true "$BACKEND_IGNORED" "backend-ignored"

          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          {
            echo "## Pull Request"
            echo
            echo "已创建或更新 PR：#${PR_NUMBER}"
            echo
            echo "自动风险等级：${{ steps.changes.outputs.risk_level }}"
            echo
            echo "AI 审查报告已写入 PR 正文。"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dry run summary
        if: steps.changes.outputs.has_changes == 'true' && env.DRY_RUN == 'true'
        run: |
          {
            echo "## Dry run"
            echo
            echo "已完成检查和本地合并演练，但没有推送分支、创建 issue 或创建 PR。"
            echo
            echo "自动风险等级：${{ steps.changes.outputs.risk_level }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload review artifacts
        if: always() && steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: upstream-review-${{ github.run_id }}
          path: upstream-review/
          if-no-files-found: ignore
          retention-days: 14

      - name: Finish summary
        if: steps.changes.outputs.has_changes == 'true' && (steps.merge.outputs.merge_conflict != 'true' || steps.repair_validation.outputs.resolved == 'true') && env.DRY_RUN != 'true'
        run: |
          {
            echo "## Done"
            echo
            echo "已创建或更新 PR：#${{ steps.pr.outputs.number }}"
            echo
            echo "AI 审查报告已直接写进 PR body。"
          } >> "$GITHUB_STEP_SUMMARY"
